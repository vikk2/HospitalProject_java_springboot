<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 80%; }
        th, td { padding: 10px; border: 1px solid black; }
        th { background-color: #f2f2f2; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>

<h2>Appointments</h2>

<table border="1">
    <tr>
        <th>Patient ID</th>
        <th>Doctor ID</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    <tr th:each="a : ${appointments}">
        <td th:text="${a.patientId}"></td>
        <td th:text="${a.doctorId}"></td>
        <td th:text="${a.appointmentDate}"></td>
        <td th:text="${a.status}"></td>
    </tr>
</table>

<br>
<a href="/appointments/form">Add Appointment</a>

</body>
</html>
