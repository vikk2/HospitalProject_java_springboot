<!DOCTYPE html>
<html>
<head>
    <title>Billing List</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 80%; }
        th, td { padding: 10px; border: 1px solid black; }
        th { background-color: #f2f2f2; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>

<h2>Billing Records</h2>

<table border="1">
    <tr>
        <th>Patient ID</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    <tr th:each="b : ${billings}">
        <td th:text="${b.patientId}"></td>
        <td th:text="${b.amount}"></td>
        <td th:text="${b.billingDate}"></td>
        <td th:text="${b.paymentStatus}"></td>
    </tr>
</table>

<br>
<a href="/billings/form">Add Billing</a>

</body>
</html>
